<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mafia Boss Love Quiz</title>
  </head>
  <body>
    <div class="wrap">
      <h1>Are you a crazy mafia boss who just felt love?</h1>
      <p class="sub">Answer honestly!</p>

      <div id="quiz">
        <label class="card"><input type="checkbox" id="q0"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q1"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q2"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q3"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q4"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q5"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q6"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q7"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q8"><span class="q"></span></label>
        <label class="card"><input type="checkbox" id="q9"><span class="q"></span></label>
      </div>

      <button class="submit-btn" onclick="showResult()">Submit for Results!</button>

      <div class="result-box" id="result">
        <div class="Badge" id="result-badge">RESULT</div>
        <p class="result-name" id="result-name"></p>
        <p class="result-desc" id="result-desc"></p>
      </div>
    </div>
    <script src="quiz.js"></script>
  </body>
</html>
