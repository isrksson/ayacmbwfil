<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mafia Boss Love Quiz</title>
  </head>
  <body>
    <div class="wrap">
      <h1>Are you a crazy mafia boss who just felt love?</h1>
      <p class="sub">Answer honestly!</p>

      <div id="quiz">
        <div class="card">
          <p class="q">1. When someone expresses affection and apprectiation, what do you do?:</p>
          <label class="opt"><input type="radio" name="q0" value="a">Blush, get embarassed, and play dead</label>
          <label class="opt"><input type="radio" name="q0" value="b">Act like a complete loser, avoid eye contact, and giggle uncontrollably</label>
          <label class="opt"><input type="radio" name="q0" value="sh">Pretend nothing happened and that everything's normal - no one knows how you actually feel abt it</label>
          <label class="opt"><input type="radio" name="q0" value="c">Deflect</label>
        </div>

        <div class="card">
          <p class="q">2. How do you handle responsibility?:</p>
          <label class="opt"><input type="radio" name="q1" value="a">I try to shoulder it all because I believe I should be the only one in charge of it </label>
          <label class="opt"><input type="radio" name="q1" value="b">I shoulder it all because I believe I should be the only one in charge of it so that everyone around me can take it easy </label>
          <label class="opt"><input type="radio" name="q1" value="sh">I try to be open with people and admit when it becomes too much but try to handle it all by myself if I can </label>
          <label class="opt"><input type="radio" name="q1" value="c">I work myself into the ground and get overwhelmed</label>
        </div>

        <div class="card">
          <p class="q">How tall are you?:</p>
          <label class="opt"><input type="radio" name="q2" value="a">Short</label>
          <label class="opt"><input type="radio" name="q2" value="b">3 apples tall</label>
          <label class="opt"><input type="radio" name="q2" value="sh">5'8</label>
          <label class="opt"><input type="radio" name="q2" value="c">I'm not short!</label>
        </div>

        <div class="card">
          <p class="q">When you first meet someone you: </p>
          <label class="opt"><input type="radio" name="q3" value="a">Want to trust them but can't open up </label>
          <label class="opt"><input type="radio" name="q3" value="b">Are immediately suspicious </label>
          <label class="opt"><input type="radio" name="q3" value="sh">Keep them at an arm's length </label>
          <label class="opt"><input type="radio" name="q3" value="c">Don't care much about them, they'll prove who they are sooner or never</label>
        </div>

        <div class="card">
          <p class="q">When you have a crush/like someone you: </p>
          <label class="opt"><input type="radio" name="q4" value="a">Get emotionally constipated</label>
          <label class="opt"><input type="radio" name="q4" value="b">Pine hopelessly </label>
          <label class="opt"><input type="radio" name="q4" value="sh">Take care of them and plan out days specific for them </label>
          <label class="opt"><input type="radio" name="q4" value="c">Try and make a move then fumble helplessly</label>
        </div>
      </div>

      <button class="submit-btn" onclick="showResult()">Submit for Results!</button>

      <div class="result-box" id="result">
        <div class="badge" id="result-badge"></div>
        <p class="result-name" id="result-name"></p>
        <p class="result-desc" id="result-desc"></p>
      </div>
    </div>
    <script src="quiz.js"></script>
  </body>
</html>
